name: Build & Push images

# Construye y publica las 3 imágenes propias del proyecto en DockerHub. Cada
# imagen se etiqueta por SHA del commit (trazabilidad y GitOps) y, en main,
# además como `latest`. Esto reemplaza los `docker build` manuales: el
# entregable se despliega desde imágenes construidas por CI.
#
# La imagen de la API de datos (cristiandiaz13/mlops-puj:data-api-pf-v1) es del
# docente y NO se reconstruye aquí.
#
# Secrets requeridos en el repo:
#   - DOCKERHUB_USERNAME : usuario/namespace de DockerHub (p. ej. dandiazc)
#   - DOCKERHUB_TOKEN    : access token de DockerHub con permiso de escritura

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pf-airflow
            dockerfile: airflow/Dockerfile
            context: .
          - name: pf-api
            dockerfile: docker/api/Dockerfile
            context: .
          - name: pf-ui
            dockerfile: docker/ui/Dockerfile
            context: .
          - name: pf-mlflow
            dockerfile: docker/mlflow/Dockerfile
            context: docker/mlflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadatos (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Resumen
        run: |
          echo "### Imagen publicada: \`${{ secrets.DOCKERHUB_USERNAME }}/mlops-${{ matrix.name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # Cierra el lazo CI -> GitOps: tras construir las imágenes, fija el tag de los
  # manifiestos al SHA del commit y los commitea. Argo CD detecta el cambio en
  # Git y despliega exactamente esa imagen desde DockerHub (sin builds locales).
  bump-manifests:
    name: Bump de tags en manifiestos (GitOps)
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar kustomize
        run: |
          curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Fijar el tag de imagen al SHA del commit
        run: |
          TAG="sha-${{ github.sha }}"
          NS="${{ secrets.DOCKERHUB_USERNAME }}"
          for c in api ui mlflow; do
            ( cd "k8s/$c" && kustomize edit set image "dandiazc/mlops-pf-$c=${NS}/mlops-pf-$c:${TAG}" )
          done

      - name: Commit & push (si hay cambios)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/api/kustomization.yaml k8s/ui/kustomization.yaml k8s/mlflow/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No hay cambios de tag."
          else
            git commit -m "chore: despliega imágenes sha-${{ github.sha }} [skip ci]"
            git push
          fi
