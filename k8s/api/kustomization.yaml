apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mlops

resources:
- configmap.yaml
- secret.yaml
- service.yaml
- deployment.yaml

# El tag lo actualiza el CI (job bump-manifests) al SHA del commit construido,
# para que Argo CD despliegue exactamente la imagen publicada en DockerHub.
images:
- name: dandiazc/mlops-pf-api
  newName: dandiazc/mlops-pf-api
  newTag: sha-b9b6dfef76faf5b3cffc498fb91d9c614db6a177
