apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: mlops
data:
  api.json: |
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "annotations": { "list": [] },
      "description": "MLOps Diabetes API - Observabilidad de inferencia",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Total de Solicitudes",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "short"
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "expr": "sum(http_requests_total{job=\"api\"})",
              "legendFormat": "Total",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Solicitudes por Segundo (RPS)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "unit": "reqps",
              "decimals": 2
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"api\"}[1m]))",
              "legendFormat": "RPS",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Latencia Promedio (ms)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "red", "value": 500 }
                ]
              },
              "unit": "ms",
              "decimals": 1
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "expr": "1000 * sum(rate(http_request_duration_seconds_sum{job=\"api\"}[1m])) / sum(rate(http_request_duration_seconds_count{job=\"api\"}[1m]))",
              "legendFormat": "Avg latency",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Errores Totales",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "expr": "sum(http_requests_total{job=\"api\", status=~\"5..\"})",
              "legendFormat": "Errores 5xx",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Tasa de Error (%)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "percent",
              "decimals": 2
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{job=\"api\", status=~\"5..\"}[1m])) / sum(rate(http_requests_total{job=\"api\"}[1m]))",
              "legendFormat": "Error rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Predicciones Totales por Clase",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "value" },
          "targets": [
            {
              "expr": "sum(inference_predictions_total) by (prediction)",
              "legendFormat": "Clase {{prediction}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "RPS en el Tiempo",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"api\"}[1m]))",
              "legendFormat": "RPS total",
              "refId": "A"
            },
            {
              "expr": "sum(rate(http_requests_total{job=\"api\", status=~\"5..\"}[1m]))",
              "legendFormat": "RPS errores",
              "refId": "B"
            }
          ]
        },
        {
          "id": 8,
          "title": "Latencia por Percentiles (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"api\"}[1m])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"api\"}[1m])))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"api\"}[1m])))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 9,
          "title": "Latencia de Inferencia del Modelo (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(inference_latency_seconds_bucket[1m])))",
              "legendFormat": "model p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(inference_latency_seconds_bucket[1m])))",
              "legendFormat": "model p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(inference_latency_seconds_bucket[1m])))",
              "legendFormat": "model p99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 10,
          "title": "Tasa de Error en el Tiempo",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.01 }
                ]
              }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"api\", status=~\"5..\"}[1m])) / sum(rate(http_requests_total{job=\"api\"}[1m]))",
              "legendFormat": "Error rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "title": "CPU Usage - API Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "custom": { "lineWidth": 2 },
              "color": { "mode": "palette-classic" }
            }
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list" } },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"mlops\", pod=~\"api-.*\", container=\"api\"}[1m]))",
              "legendFormat": "CPU usage (cores)",
              "refId": "A"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"mlops\", pod=~\"api-.*\", container=\"api\", resource=\"cpu\"})",
              "legendFormat": "CPU limit",
              "refId": "B"
            }
          ]
        },
        {
          "id": 12,
          "title": "Memory Usage - API Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2 },
              "color": { "mode": "palette-classic" }
            }
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list" } },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"mlops\", pod=~\"api-.*\", container=\"api\"})",
              "legendFormat": "Memory working set",
              "refId": "A"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"mlops\", pod=~\"api-.*\", container=\"api\", resource=\"memory\"})",
              "legendFormat": "Memory limit",
              "refId": "B"
            }
          ]
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "tags": ["mlops", "inference", "diabetes"],
      "templating": {
        "list": [
          {
            "hide": 2,
            "name": "DS_PROMETHEUS",
            "query": "prometheus",
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "MLOps - API de Inferencia Diabetes",
      "uid": "mlops-api-observability",
      "version": 1
    }
    
