apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  namespace: mlops
  labels:
    app: locust-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: locust-worker
  template:
    metadata:
      labels:
        app: locust-worker
    spec:
      containers:
        - name: locust
          image: locustio/locust:2.24.0
          command:
            - locust
            - -f
            - /mnt/locust/locustfile.py
            - --worker
            - --master-host
            - locust-master
          volumeMounts:
            - name: locust-script
              mountPath: /mnt/locust
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "locust"]
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: locust-script
          configMap:
            name: locust-script
