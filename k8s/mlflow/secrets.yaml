# ⚠️ CREDENCIALES DE DESARROLLO — NO USAR EN PRODUCCIÓN.
# Valores ficticios para levantar el stack en local de forma reproducible. En
# producción gestiónalos FUERA de git (Sealed Secrets / SOPS / External Secrets
# o `kubectl create secret`) y rótalos. Ver README → "Seguridad y secretos".
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-secret
  namespace: mlops
  labels:
    app: mlflow
type: Opaque
stringData:
  # Postgres backend store — DB "mlflow" creada por init.sql (01-databases.sql)
  MLFLOW_BACKEND_STORE_URI: "postgresql+psycopg2://mlops_user:mlops_pass_2026@postgres-service:5432/mlflow"
  # MinIO / S3-compatible artifact store credentials
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin123"
