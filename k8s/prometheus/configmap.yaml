apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mlops
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]

      # Descubrimiento de pods vía anotaciones prometheus.io/{scrape,port,path}.
      # Scrapea CADA réplica por separado (no una aleatoria detrás del Service),
      # usando las anotaciones ya definidas en k8s/api/deployment.yaml y el RBAC
      # de rbac.yaml. job=<label app> para que el dashboard de Grafana (job="api")
      # siga encontrando las series.
      - job_name: kubernetes-pods
        scrape_interval: 10s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [mlops]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: job
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
